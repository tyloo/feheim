<svg xmlns="http://www.w3.org/2000/svg" width="820" height="240" viewBox="0 0 820 240" role="img" aria-label="FEHEIM">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" x2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="820" height="240" rx="20" fill="#0b0f14"/>
  <rect x="1" y="1" width="818" height="238" rx="19" fill="none" stroke="url(#brand)" stroke-opacity="0.25" stroke-width="2"/>

  <!-- hex motifs -->
  <g stroke="url(#brand)" stroke-width="2" fill="none" opacity="0.45">
    <path d="M86 78 l30 -17 30 17 0 34 -30 17 -30 -17 Z"/>
    <path d="M704 128 l30 -17 30 17 0 34 -30 17 -30 -17 Z"/>
  </g>

  <text x="410" y="132" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="90" font-weight="700" letter-spacing="16"
        fill="url(#brand)" filter="url(#glow)">FEHEIM</text>

  <rect x="200" y="158" width="420" height="2" fill="url(#rule)"/>

  <text x="410" y="190" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="17" font-weight="500" letter-spacing="7"
        fill="#8b98a5">HOMEBREW CORE &#183; REFORGED IN RUST</text>
</svg>
